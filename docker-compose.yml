version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: erp_foot_db
    environment:
      POSTGRES_DB: erp_foot
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - erp-network

volumes:
  db-data:

networks:
  erp-network:
    driver: bridge